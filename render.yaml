services:
  - type: web
    name: peer-finance-manager
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: node peer-finance-manager/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: PFM_DATA_DIR
        value: /var/data
      - key: PFM_COOP_ROOT
        value: /var/data
    disk:
      name: pfm-data
      mountPath: /var/data
      sizeGB: 1
