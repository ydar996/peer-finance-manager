<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Learn about our Cooperative and review our bylaws." />
    <meta name="theme-color" content="#0c4a6e" />
    <title>Cooperative</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/cooperative-public.css" />
  </head>
  <body class="cp-public">
    <div class="cp-progress" id="scrollProgress" aria-hidden="true"></div>

    <header class="cp-topbar">
      <div class="cp-topbar-inner">
        <div class="cp-mark">
          <div class="cp-mark-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
              <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
          </div>
          <div>
            <p class="cp-org-name" id="orgName">Cooperative</p>
            <p class="cp-org-tag">Member-owned · Community finance</p>
          </div>
        </div>
        <nav class="cp-segment" aria-label="Public Cooperative pages">
          <a id="navAbout" href="#"><span>About Us</span></a>
          <a id="navBylaws" href="#"><span>Bylaws</span></a>
          <a id="navApply" href="#"><span>Apply for Membership</span></a>
        </nav>
      </div>
    </header>

    <main class="cp-main">
      <section class="cp-hero" id="hero">
        <div class="cp-hero-bg" aria-hidden="true"></div>
        <div class="cp-hero-inner">
          <p class="cp-hero-eyebrow" id="heroEyebrow">Welcome</p>
          <h1 id="pageTitle">About Us</h1>
          <p class="cp-hero-lead" id="heroLead">Learn who we are and how membership works.</p>
          <div class="cp-hero-meta hidden" id="heroMeta" aria-label="Jump to section"></div>
          <div class="cp-hero-actions hidden" id="heroActions"></div>
        </div>
      </section>

      <div id="status" class="cp-alert hidden" role="alert"></div>

      <button type="button" class="cp-toc-fab" id="tocFab" aria-expanded="false" aria-controls="tocPanel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <line x1="8" y1="6" x2="21" y2="6" />
          <line x1="8" y1="12" x2="21" y2="12" />
          <line x1="8" y1="18" x2="21" y2="18" />
          <line x1="3" y1="6" x2="3.01" y2="6" />
          <line x1="3" y1="12" x2="3.01" y2="12" />
          <line x1="3" y1="18" x2="3.01" y2="18" />
        </svg>
        Sections
      </button>

      <div class="cp-layout">
        <aside class="cp-toc-panel" id="tocPanel" aria-label="On this page">
          <div class="cp-toc-card">
            <div class="cp-toc-head">
              <p class="cp-toc-heading">On this page</p>
              <button type="button" class="cp-toc-close" id="tocClose" aria-label="Close section menu">×</button>
            </div>
            <nav id="tocNav" class="cp-toc"></nav>
          </div>
        </aside>

        <article class="cp-content-card" id="contentCard">
          <div id="contentArea" class="cp-content-area" aria-live="polite">
            <div class="cp-content-loading">
              <div class="cp-spinner" aria-hidden="true"></div>
              <p>Loading content…</p>
            </div>
          </div>
        </article>
      </div>
    </main>

    <footer class="cp-footer">
      <div class="cp-footer-inner">
        <p id="footerNote">Official Cooperative information for prospective and current members.</p>
        <nav class="cp-footer-links" id="footerLinks" aria-label="Cooperative links"></nav>
      </div>
    </footer>

    <button type="button" class="cp-back-top hidden" id="backTop" aria-label="Back to top">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <polyline points="18 15 12 9 6 15" />
      </svg>
    </button>

    <script src="/flexxforms-embed.js"></script>
    <script>
      (function () {
        const APPLY_RECEIVED_KEY_PREFIX = "pfmApplyReceived:";
        const APPLY_RETURN_KEY_PREFIX = "pfmApplyReturn:";
        const APPLY_THANKS =
          "Thank you! Your application was received. Our administrators will review it after your membership fee and initial contribution are confirmed.";

        function buildApplyHref(slug, fromPage) {
          const from = fromPage === "bylaws" ? "bylaws" : "about";
          return (
            "/c/" +
            encodeURIComponent(slug) +
            "/apply?from=" +
            encodeURIComponent(from)
          );
        }

        function normalizeFromPage(value) {
          return String(value || "").toLowerCase() === "bylaws" ? "bylaws" : "about";
        }

        function returnPageLabel(fromPage) {
          return fromPage === "bylaws" ? "Bylaws" : "About Us";
        }

        function markApplyReceived(slug) {
          try {
            sessionStorage.setItem(APPLY_RECEIVED_KEY_PREFIX + slug, "1");
          } catch (_) {
            /* ignore */
          }
        }

        function consumeApplyReceivedFlash(slug) {
          try {
            const key = APPLY_RECEIVED_KEY_PREFIX + slug;
            if (sessionStorage.getItem(key) !== "1") return;
            sessionStorage.removeItem(key);
            const el = document.getElementById("status");
            if (!el) return;
            el.textContent = APPLY_THANKS;
            el.className = "cp-alert cp-apply-success";
            el.classList.remove("hidden");
            window.setTimeout(function () {
              el.classList.add("hidden");
            }, 12000);
          } catch (_) {
            /* ignore */
          }
        }

        function setupPublicNav(slug, page, fromPage) {
          const aboutHref = "/c/" + encodeURIComponent(slug) + "/about";
          const bylawsHref = "/c/" + encodeURIComponent(slug) + "/bylaws";
          const applyHref = buildApplyHref(slug, fromPage || page);
          const memberSignInHref = "/member?org=" + encodeURIComponent(slug);

          const navAbout = document.getElementById("navAbout");
          const navBylaws = document.getElementById("navBylaws");
          const navApply = document.getElementById("navApply");
          navAbout.href = aboutHref;
          navBylaws.href = bylawsHref;
          navApply.href = applyHref;
          navAbout.classList.toggle("active", page === "about");
          navBylaws.classList.toggle("active", page === "bylaws");
          navApply.classList.toggle("active", page === "apply");
          [navAbout, navBylaws, navApply].forEach(function (link) {
            link.removeAttribute("aria-current");
          });
          if (page === "about") navAbout.setAttribute("aria-current", "page");
          if (page === "bylaws") navBylaws.setAttribute("aria-current", "page");
          if (page === "apply") navApply.setAttribute("aria-current", "page");

          renderFooterLinks(aboutHref, bylawsHref, applyHref, memberSignInHref);
          return { aboutHref, bylawsHref, applyHref, memberSignInHref };
        }

        function renderFooterLinks(aboutHref, bylawsHref, applyHref, memberSignInHref) {
          const footer = document.getElementById("footerLinks");
          if (!footer) return;
          footer.innerHTML =
            '<a href="' +
            aboutHref +
            '">About Us</a><a href="' +
            bylawsHref +
            '">Bylaws</a><a href="' +
            applyHref +
            '">Apply for Membership</a><a href="' +
            memberSignInHref +
            '">Member Sign In</a>';
        }

        function showError(message) {
          const el = document.getElementById("status");
          el.textContent = message;
          el.className = "cp-alert";
          el.classList.remove("hidden");
        }

        function setApplyStatus(message, kind) {
          const el = document.getElementById("applyStatus");
          if (!el) return;
          if (!message) {
            el.textContent = "";
            el.className = "cp-apply-status hidden";
            return;
          }
          el.textContent = message;
          el.className =
            "cp-apply-status " + (kind === "error" ? "cp-apply-status-error" : "cp-apply-status-info");
          el.classList.remove("hidden");
        }

        function syncApplySigningLayout() {
          const landscapeShort =
            window.matchMedia("(orientation: landscape) and (max-height: 520px)").matches;
          document.body.classList.toggle("cp-landscape-signing", landscapeShort);
        }

        window.addEventListener("orientationchange", syncApplySigningLayout);
        window.addEventListener("resize", syncApplySigningLayout);

        function initApplyPage(slug) {
          const params = new URLSearchParams(window.location.search);
          const fromPage = normalizeFromPage(params.get("from"));
          try {
            sessionStorage.setItem(APPLY_RETURN_KEY_PREFIX + slug, fromPage);
          } catch (_) {
            /* ignore */
          }

          document.body.classList.add("cp-page-apply");
          document.querySelector(".cp-layout")?.classList.add("cp-layout-apply");
          document.getElementById("tocFab")?.classList.add("hidden");
          document.getElementById("hero")?.classList.add("hidden");

          const copy = PAGE_COPY.apply;
          document.getElementById("pageTitle").textContent = copy.title;
          document.getElementById("heroEyebrow").textContent = copy.eyebrow;
          document.getElementById("heroLead").textContent =
            "Complete the membership application below. After you submit, you will return to " +
            returnPageLabel(fromPage) +
            ".";
          document.getElementById("heroMeta").classList.add("hidden");
          document.getElementById("heroActions").classList.add("hidden");
          document.title = copy.title;

          setupPublicNav(slug, "apply", fromPage);
          const returnHref = "/c/" + encodeURIComponent(slug) + "/" + fromPage;

          document.getElementById("contentArea").innerHTML =
            '<div class="cp-apply-shell">' +
            '<p class="cp-apply-sign-tip"><strong>Signature Tip:</strong> Rotate to Landscape for a Wider Signature Area. After Signing, Scroll Inside the Form to Reach Submit. The Page Header Hides Automatically in Landscape While You Sign.</p>' +
            '<p id="applyStatus" class="cp-apply-status hidden" role="status"></p>' +
            '<div id="applyEmbedHost" class="cp-apply-embed-host"></div>' +
            '<p class="cp-apply-footnote">If the form does not load, <a class="cp-apply-full-window-link" id="applyFullWindowLink" href="#" target="_blank" rel="noopener noreferrer">open the application in a full window</a>. You can return to <a href="' +
            returnHref +
            '">' +
            returnPageLabel(fromPage) +
            "</a> when finished.</p>" +
            "</div>";

          fetch("/api/public/organizations/" + encodeURIComponent(slug))
            .then(function (res) {
              return res.json().then(function (data) {
                if (res.ok && data.organization && data.organization.name) {
                  document.getElementById("orgName").textContent = data.organization.name;
                  document.title = data.organization.name + " \u2014 " + copy.title;
                }
              });
            })
            .catch(function () {});

          fetch("/api/public/organizations/" + encodeURIComponent(slug) + "/flexxforms")
            .then(function (res) {
              return res.json().then(function (data) {
                if (!res.ok) throw new Error(data.error || "Unable to open application form");
                const formId = data.membershipFormId;
                const embedUrl = data.membershipEmbedUrl;
                if (!formId && !embedUrl) {
                  throw new Error(
                    "The membership application is not published yet. Please check back soon or contact the Cooperative."
                  );
                }
                const fullWindowLink = document.getElementById("applyFullWindowLink");
                if (fullWindowLink && embedUrl) {
                  fullWindowLink.href = embedUrl;
                }
                const host = document.getElementById("applyEmbedHost");
                if (!host || !window.mountFlexxFormsEmbed) {
                  throw new Error("Application form could not be loaded. Please refresh and try again.");
                }
                return window.mountFlexxFormsEmbed(host, {
                  formId: formId,
                  embedUrl: embedUrl,
                  formTitle: "Membership application",
                  onSubmitting: function () {
                    setApplyStatus("Submitting your application\u2026", "info");
                  },
                  onError: function (payload) {
                    const msg =
                      payload?.message ||
                      payload?.error ||
                      "Please fix the highlighted fields and try again.";
                    setApplyStatus(msg, "error");
                  },
                  onCompleted: function () {
                    markApplyReceived(slug);
                    window.location.replace(returnHref);
                  },
                }).then(function () {
                  document.body.classList.add("cp-page-apply-active");
                  syncApplySigningLayout();
                });
              });
            })
            .catch(function (err) {
              document.getElementById("contentArea").innerHTML = "";
              showError(err.message);
            });
        }

        const PAGE_COPY = {
          about: {
            title: "About Us",
            eyebrow: "Who we are",
            lead: "Our mission, membership guidelines, goals, and leadership: shared openly for anyone considering joining.",
            sectionJumps: [
              { label: "Membership", target: "membership" },
              { label: "Goals", target: "goals" },
              { label: "Leadership", target: "officials" },
            ],
            apiPath: "about",
            pageClass: "cp-page-about",
          },
          bylaws: {
            title: "Bylaws",
            eyebrow: "Governance",
            lead: "The rules and structure that guide how our Cooperative operates, organized for easy reading.",
            apiPath: "bylaws",
            pageClass: "cp-page-bylaws",
          },
          apply: {
            title: "Apply for Membership",
            eyebrow: "Join our Cooperative",
            lead: "Opening the membership application form…",
            apiPath: null,
            pageClass: "cp-page-apply",
          },
        };

        const match = window.location.pathname.replace(/\/$/, "").match(/^\/c\/([^/]+)\/(about|bylaws|apply)$/i);
        if (!match) {
          showError("This page could not be found.");
          return;
        }

        const slug = decodeURIComponent(match[1]).toLowerCase();
        const page = match[2].toLowerCase();

        if (page === "apply") {
          syncApplySigningLayout();
          initApplyPage(slug);
          return;
        }

        const copy = PAGE_COPY[page];
        const fromPage = page;
        let aboutHref = "/c/" + encodeURIComponent(slug) + "/about";
        let bylawsHref = "/c/" + encodeURIComponent(slug) + "/bylaws";
        let applyHref = buildApplyHref(slug, fromPage);
        const memberSignInHref = "/member?org=" + encodeURIComponent(slug);

        document.body.classList.add(copy.pageClass);
        document.getElementById("pageTitle").textContent = copy.title;
        document.getElementById("heroEyebrow").textContent = copy.eyebrow;
        document.getElementById("heroLead").textContent = copy.lead;
        document.getElementById("heroMeta").classList.add("hidden");

        setupPublicNav(slug, page, fromPage);

        function refreshApplyLinks() {
          applyHref = buildApplyHref(slug, fromPage);
          document.getElementById("navApply").href = applyHref;
          renderFooterLinks(aboutHref, bylawsHref, applyHref, memberSignInHref);
          renderHeroActions(page, aboutHref, bylawsHref, applyHref);
        }

        function applyPublicPageUrls(data) {
          if (data.publicAboutUrl) {
            aboutHref = data.publicAboutUrl;
            document.getElementById("navAbout").href = aboutHref;
          }
          if (data.publicBylawsUrl) {
            bylawsHref = data.publicBylawsUrl;
            document.getElementById("navBylaws").href = bylawsHref;
          }
          if (data.applyAvailable !== false && data.publicApplyUrl) {
            refreshApplyLinks();
          }
        }

        renderHeroActions(page, aboutHref, bylawsHref, applyHref);

        const tocFab = document.getElementById("tocFab");
        const tocPanel = document.getElementById("tocPanel");
        const tocClose = document.getElementById("tocClose");
        const backTop = document.getElementById("backTop");
        const scrollProgress = document.getElementById("scrollProgress");

        fetch("/api/public/organizations/" + encodeURIComponent(slug) + "/" + copy.apiPath)
          .then(function (res) {
            return res.json().then(function (data) {
              if (!res.ok) throw new Error(data.error || "Content not available");
              if (data.externalUrl) {
                window.location.replace(data.externalUrl);
                return;
              }
              if (data.mode === "pdf" && data.downloadUrl) {
                window.location.replace(data.downloadUrl);
                return;
              }
              if (!data.html) throw new Error("This page has no published content yet.");
              renderContent(data.html, applyHref, page);
              consumeApplyReceivedFlash(slug);
            });
          })
          .catch(function (err) {
            showError(err.message);
            document.getElementById("contentArea").innerHTML = "";
          });

        tocFab?.addEventListener("click", function () {
          const open = tocPanel.classList.toggle("is-open");
          tocFab.setAttribute("aria-expanded", open ? "true" : "false");
        });
        tocClose?.addEventListener("click", function () {
          tocPanel.classList.remove("is-open");
          tocFab.setAttribute("aria-expanded", "false");
        });

        backTop?.addEventListener("click", function () {
          window.scrollTo({ top: 0, behavior: "smooth" });
        });

        window.addEventListener("scroll", onScroll, { passive: true });
        onScroll();

        fetch("/api/public/organizations/" + encodeURIComponent(slug))
          .then(function (res) {
            return res.json().then(function (data) {
              if (!res.ok) throw new Error(data.error || "Organization not found");
              const name = data.organization && data.organization.name;
              if (name) {
                document.getElementById("orgName").textContent = name;
                document.title = name + " \u2014 " + copy.title;
                document.getElementById("footerNote").textContent =
                  "Official information published by " + name + ".";
              } else {
                document.title = copy.title;
              }
              applyPublicPageUrls(data);
            });
          })
          .catch(function () {});

        function renderHeroActions(page, aboutHref, bylawsHref, applyHref) {
          const actions = document.getElementById("heroActions");
          if (!actions || page === "apply") return;
          actions.classList.remove("hidden");
          if (page === "about") {
            actions.innerHTML =
              '<a class="cp-hero-btn cp-hero-btn-primary" href="' +
              applyHref +
              '">Apply for Membership</a><a class="cp-hero-btn cp-hero-btn-secondary" href="' +
              bylawsHref +
              '">Read Bylaws</a>';
          } else {
            actions.innerHTML =
              '<a class="cp-hero-btn cp-hero-btn-primary" href="' +
              applyHref +
              '">Apply for Membership</a><a class="cp-hero-btn cp-hero-btn-secondary" href="' +
              aboutHref +
              '">About Us</a>';
          }
        }

        function renderContent(html, applyHref, page) {
          const area = document.getElementById("contentArea");
          area.innerHTML = html;
          enhanceContent(area);
          injectMembershipApplyPromos(area, applyHref, page);
          syncHeroSectionJumps(copy.sectionJumps, area);
          buildToc(area);
          observeSections(area);
        }

        function syncHeroSectionJumps(jumps, root) {
          const meta = document.getElementById("heroMeta");
          if (!meta || !jumps || !jumps.length) {
            meta?.classList.add("hidden");
            return;
          }
          const available = jumps.filter(function (jump) {
            return root.querySelector("#" + jump.target);
          });
          if (!available.length) {
            meta.classList.add("hidden");
            meta.innerHTML = "";
            return;
          }
          meta.classList.remove("hidden");
          meta.innerHTML = "";
          const nav = document.createElement("nav");
          nav.className = "cp-hero-jumps";
          nav.setAttribute("aria-label", "Jump to section");
          available.forEach(function (jump) {
            const link = document.createElement("a");
            link.className = "cp-hero-chip cp-hero-jump";
            link.href = "#" + jump.target;
            link.textContent = jump.label;
            link.addEventListener("click", function (e) {
              e.preventDefault();
              const target = document.getElementById(jump.target);
              if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
            });
            nav.appendChild(link);
          });
          meta.appendChild(nav);
        }

        function injectMembershipApplyPromos(area, applyHref, page) {
          if (!applyHref) return;
          if (!area.querySelector(".cp-apply-promo")) {
            const promo = document.createElement("div");
            promo.className = "cp-apply-promo";
            promo.innerHTML =
              '<div class="cp-apply-promo-copy"><h3>Become a Member</h3><p>Ready to join our Cooperative? Complete the online membership application. No login required.</p></div><a class="cp-crosslink-btn" href="' +
              applyHref +
              '">Apply for Membership</a>';
            const membershipSection = area.querySelector("#membership");
            if (membershipSection) {
              membershipSection.appendChild(promo);
            } else if (page === "bylaws") {
              const firstSection = area.querySelector(".cp-section");
              if (firstSection) firstSection.insertAdjacentElement("afterend", promo);
              else area.insertAdjacentElement("afterbegin", promo);
            } else {
              area.appendChild(promo);
            }
          }
          area.querySelectorAll(".cp-crosslink-card").forEach(function (card) {
            if (card.querySelector(".cp-crosslink-apply")) return;
            const applyLink = document.createElement("a");
            applyLink.className = "cp-crosslink-btn cp-crosslink-apply";
            applyLink.href = applyHref;
            applyLink.textContent = "Apply for Membership";
            card.appendChild(applyLink);
          });
        }

        function enhanceContent(area) {
          area.querySelectorAll(".cp-official-card").forEach(function (card) {
            const nameEl = card.querySelector(".cp-official-name");
            if (!nameEl || card.querySelector(".cp-official-avatar")) return;

            let body = card.querySelector(".cp-official-body");
            if (!body) {
              body = document.createElement("div");
              body.className = "cp-official-body";
              card.insertBefore(body, nameEl);
              body.appendChild(nameEl);
              const roleEl = card.querySelector(".cp-official-role");
              if (roleEl) body.appendChild(roleEl);
              const phoneEl = card.querySelector(".cp-official-phone");
              if (phoneEl) body.appendChild(phoneEl);
            }

            const initials = nameEl.textContent
              .split(/\s+/)
              .slice(0, 2)
              .map(function (w) {
                return w[0] || "";
              })
              .join("")
              .toUpperCase();
            const avatar = document.createElement("div");
            avatar.className = "cp-official-avatar";
            avatar.textContent = initials;
            card.insertBefore(avatar, body);
          });

          area.querySelectorAll(".cp-section").forEach(function (section, index) {
            section.style.setProperty("--cp-section-index", String(index + 1));
            section.classList.add("cp-section-reveal");
          });
        }

        function buildToc(area) {
          const toc = document.getElementById("tocNav");
          toc.innerHTML = "";
          const sections = area.querySelectorAll(".cp-section[id]");
          if (!sections.length) {
            toc.innerHTML = '<p class="cp-toc-empty">Sections will appear here.</p>';
            return;
          }
          sections.forEach(function (section, index) {
            const titleEl = section.querySelector(".cp-section-title");
            const label = titleEl ? titleEl.textContent.trim() : section.id;
            const link = document.createElement("a");
            link.href = "#" + section.id;
            link.dataset.target = section.id;
            link.innerHTML =
              '<span class="cp-toc-num">' +
              String(index + 1).padStart(2, "0") +
              '</span><span class="cp-toc-label">' +
              label +
              "</span>";
            link.addEventListener("click", function (e) {
              e.preventDefault();
              section.scrollIntoView({ behavior: "smooth", block: "start" });
              history.replaceState(null, "", "#" + section.id);
              tocPanel.classList.remove("is-open");
              tocFab.setAttribute("aria-expanded", "false");
            });
            toc.appendChild(link);
          });

          if (window.location.hash) {
            const target = area.querySelector(window.location.hash);
            if (target) {
              setTimeout(function () {
                target.scrollIntoView({ behavior: "smooth", block: "start" });
              }, 120);
            }
          }
        }

        function observeSections(area) {
          const links = Array.from(document.querySelectorAll("#tocNav a[data-target]"));
          if (!links.length || !("IntersectionObserver" in window)) return;

          const observer = new IntersectionObserver(
            function (entries) {
              entries.forEach(function (entry) {
                if (!entry.isIntersecting) return;
                links.forEach(function (link) {
                  link.classList.toggle("is-active", link.dataset.target === entry.target.id);
                });
              });
            },
            { rootMargin: "-20% 0px -65% 0px", threshold: 0 }
          );

          area.querySelectorAll(".cp-section[id]").forEach(function (section) {
            observer.observe(section);
          });
        }

        function onScroll() {
          const scrollTop = window.scrollY || document.documentElement.scrollTop;
          const height = document.documentElement.scrollHeight - window.innerHeight;
          const pct = height > 0 ? Math.min(100, (scrollTop / height) * 100) : 0;
          scrollProgress.style.width = pct + "%";
          backTop.classList.toggle("hidden", scrollTop < 480);
        }
      })();
    </script>
  </body>
</html>
